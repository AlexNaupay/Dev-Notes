engine.name=lim1

db.driver=org.postgresql.Driver
db.url=jdbc:postgresql://172.17.0.2:5432/myapp_db
db.user=myuser
db.password=mypass

# Equal to node_group_id in sym_node_group table. Triggers and routers are assigned to groups
group.id=lim-group-for-x
external.id=lim1-id
instance.id=lim1-instance

# URL where this node listens
sync.url=http://172.17.0.2:31415/sync/lim1
# Accept registrations?
registration.enabled=true
# Where to registrate this node (empty if this is the first=root)
registration.url=
# Register in registration.url at startup
auto.registration=true

# Check sym_data and send data
job.routing.period.time.ms=5000
job.push.period.time.ms=1000
job.pull.period.time.ms=1000

# Create tables if not exists in this node?
initial.load.create.first=true